<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
        }
        table {
            width: 100%;
            background: #16213e;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        th {
            background: #e94560;
        }
        .winner {
            color: #4ecdc4;
            font-weight: bold;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Admin Dashboard - Tracker iPhone Contest</h1>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalVisitors">-</div>
                <div>Visiteurs uniques</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalParticipants">-</div>
                <div>Participants</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalWinners">-</div>
                <div>Gagnants</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="conversionRate">-</div>
                <div>Taux conversion</div>
            </div>
        </div>
        
        <h2>📋 Derniers participants</h2>
        <table id="participants-table">
            <thead>
                <tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Date</th><th>Gagnant</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <h2>🖥️ Derniers visiteurs</h2>
        <table id="visitors-table">
            <thead>
                <tr><th>UUID</th><th>Appareil</th><th>Écran</th><th>Plateforme</th><th>Dernière vue</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <script>
        const API_URL = "https://concours.onrender.com";  // ← REMPLACE PAR TON URL
        const ADMIN_KEY = "arcane@M12";
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'X-API-Key': ADMIN_KEY }
                });
                const data = await response.json();
                
                document.getElementById('totalVisitors').innerText = data.stats.total_visitors;
                document.getElementById('totalParticipants').innerText = data.stats.total_participants;
                document.getElementById('totalWinners').innerText = data.stats.total_winners;
                document.getElementById('conversionRate').innerText = data.stats.conversion_rate + '%';
                
                // Participants
                const tbody = document.querySelector('#participants-table tbody');
                tbody.innerHTML = '';
                data.participants.forEach(p => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${p.name}</td><td>${p.email}</td><td>${p.phone}</td>
                        <td>${new Date(p.date).toLocaleString()}</td>
                        <td class="${p.winner ? 'winner' : ''}">${p.winner ? '🏆 GAGNANT' : '❌'}</td>
                    `;
                });
                
                // Visiteurs
                const tbody2 = document.querySelector('#visitors-table tbody');
                tbody2.innerHTML = '';
                data.visitors.forEach(v => {
                    const row = tbody2.insertRow();
                    row.innerHTML = `
                        <td>${v.uuid}</td><td>${v.device}</td><td>${v.screen}</td>
                        <td>${v.platform}</td><td>${new Date(v.last_seen).toLocaleString()}</td>
                    `;
                });
                
            } catch(e) {
                console.error('Erreur:', e);
            }
        }
        
        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
